<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Leads — Agencia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11; --bg2: #16181c; --bg3: #1e2128;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0; --text2: #8a8f9a; --text3: #555b66;
    --green: #00d084; --green-dim: rgba(0,208,132,0.12);
    --red: #ff5c5c; --red-dim: rgba(255,92,92,0.1);
    --radius: 12px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 3px var(--green); }
  }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .logo-text span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-update { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .btn-refresh {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px; background: transparent;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-refresh:hover { background: var(--bg3); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-refresh.loading { opacity: 0.5; pointer-events: none; }
  .refresh-icon { font-size: 14px; display: inline-block; }
  .btn-refresh.loading .refresh-icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 16px;
  }
  .loading-spinner {
    width: 32px; height: 32px; border: 2px solid var(--border2);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-state p { font-size: 14px; color: var(--text2); }
  .error-state {
    background: var(--red-dim); border: 1px solid rgba(255,92,92,0.2);
    border-radius: var(--radius); padding: 20px 24px;
    color: var(--red); font-size: 14px; margin-bottom: 24px;
  }

  .metrics-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .metric-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; transition: border-color 0.2s;
  }
  .metric-card:hover { border-color: var(--border2); }
  .metric-card.highlight { border-color: rgba(0,208,132,0.25); background: rgba(0,208,132,0.04); }
  .metric-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 10px; }
  .metric-value { font-size: 32px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-bottom: 8px; }
  .metric-card.highlight .metric-value { color: var(--green); }
  .tag { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 8px; border-radius: 99px; font-family: 'DM Mono', monospace; }
  .tag-green { background: var(--green-dim); color: var(--green); }
  .tag-red { background: var(--red-dim); color: var(--red); }
  .tag-neu { background: var(--bg3); color: var(--text3); }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 4px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) {
    .grid-2 { grid-template-columns: 1fr; }
    header { padding: 16px 20px; flex-wrap: wrap; gap: 10px; }
    main { padding: 20px 16px; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-wrap { position: relative; width: 100%; height: 240px; margin-top: 16px; }

  .country-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .country-row { display: flex; align-items: center; gap: 10px; }
  .country-rank { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 18px; text-align: right; }
  .country-name { font-size: 13px; color: var(--text); min-width: 100px; }
  .country-bar-wrap { flex: 1; height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .country-bar { height: 100%; background: var(--green); border-radius: 99px; }
  .country-count { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text2); min-width: 24px; text-align: right; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <div class="logo-text">Leads <span>en vivo</span></div>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update">—</span>
    <button class="btn-refresh" id="refresh-btn" onclick="loadAndRender()">
      <span class="refresh-icon">↻</span> Actualizar
    </button>
  </div>
</header>

<main>
  <div class="loading-state" id="loading-state">
    <div class="loading-spinner"></div>
    <p>Conectando con Google Sheets...</p>
  </div>
  <div id="error-state" style="display:none;"></div>
  <div id="dashboard" style="display:none;">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="divider"></div>
    <div class="grid-2">
      <div class="chart-card">
        <div class="section-title">Leads por mes</div>
        <div class="chart-wrap">
          <canvas id="monthChart" role="img" aria-label="Leads por mes">Gráfico de leads por mes.</canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="section-title">Países — mes actual</div>
        <div class="country-list" id="clist"></div>
      </div>
    </div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0kX4orp51DL0vVwxJoTXbFUk31Wtse-nRmWukmk--K_4Z6z9MA5qB2RPwDVH3s2H42qBhVQPQ1zBG/pub?output=csv';
let chartInstance = null;

function getWeek(offset) {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23, 59, 59, 999);
  return { s: mon, e: sun };
}

function pd(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

async function loadAndRender() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('error-state').style.display = 'none';
  const isFirst = document.getElementById('dashboard').style.display === 'none';
  if (isFirst) document.getElementById('loading-state').style.display = 'flex';

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('Error al descargar datos (código ' + resp.status + '). Verificá que el Sheet esté publicado en la web.');
    const text = await resp.text();
    Papa.parse(text, {
      skipEmptyLines: true,
      complete: (results) => {
        const rows = results.data.filter((r, i) => i > 0 && r[0] && /\d{4}-\d{2}-\d{2}/.test(r[0]));
        render(rows);
        btn.classList.remove('loading');
      },
      error: (e) => { throw new Error(e.message); }
    });
  } catch(e) {
    document.getElementById('error-state').innerHTML = '<div class="error-state">⚠ ' + e.message + '</div>';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('loading-state').style.display = 'none';
    btn.classList.remove('loading');
  }
}

function render(rows) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  const thisM = now.getMonth(), thisY = now.getFullYear();
  const prevM = thisM === 0 ? 11 : thisM - 1;
  const prevMY = thisM === 0 ? thisY - 1 : thisY;
  const tw = getWeek(0), pw = getWeek(-1);

  let today = 0, thisWeek = 0, prevWeek = 0, thisMonth = 0, prevMonth = 0;
  const byMonth = {}, cc = {};

  rows.forEach(r => {
    const d = pd(r[0]);
    if (!d) return;
    const ds = r[0].slice(0, 10);
    const sm = d.getMonth(), sy = d.getFullYear();
    const mk = sy + '-' + String(sm + 1).padStart(2, '0');
    byMonth[mk] = (byMonth[mk] || 0) + 1;
    if (ds === todayStr) today++;
    if (d >= tw.s && d <= tw.e) thisWeek++;
    if (d >= pw.s && d <= pw.e) prevWeek++;
    if (sm === thisM && sy === thisY) {
      thisMonth++;
      const country = (r[3] || '').trim();
      if (country) cc[country] = (cc[country] || 0) + 1;
    }
    if (sm === prevM && sy === prevMY) prevMonth++;
  });

  const wDelta = prevWeek > 0 ? Math.round((thisWeek - prevWeek) / prevWeek * 100) : null;
  const mDelta = prevMonth > 0 ? Math.round((thisMonth - prevMonth) / prevMonth * 100) : null;

  function deltaHtml(v, label) {
    if (v === null) return '<span class="tag tag-neu">Sin datos previos</span>';
    const cls = v > 0 ? 'tag-green' : v < 0 ? 'tag-red' : 'tag-neu';
    const sign = v > 0 ? '+' : '';
    return `<span class="tag ${cls}">${sign}${v}% vs ${label}</span>`;
  }

  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mesActual = meses[thisM] + ' ' + String(thisY).slice(2);
  const mesPrev = meses[prevM] + ' ' + String(prevMY).slice(2);

  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Total acumulado</div>
      <div class="metric-value">${rows.length.toLocaleString('es-AR')}</div>
      <div class="metric-delta"><span class="tag tag-neu">todos los registros</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Leads hoy</div>
      <div class="metric-value">${today}</div>
      <div class="metric-delta"><span class="tag tag-neu">${todayStr}</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Esta semana</div>
      <div class="metric-value">${thisWeek}</div>
      <div class="metric-delta">${deltaHtml(wDelta, 'sem. ant.')}</div>
    </div>
    <div class="metric-card highlight">
      <div class="metric-label">Este mes · ${mesActual}</div>
      <div class="metric-value">${thisMonth}</div>
      <div class="metric-delta">${deltaHtml(mDelta, mesPrev)}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Mes anterior · ${mesPrev}</div>
      <div class="metric-value">${prevMonth}</div>
      <div class="metric-delta"><span class="tag tag-neu">&nbsp;</span></div>
    </div>
  `;

  const sortedM = Object.keys(byMonth).sort().slice(-18);
  const labels = sortedM.map(k => { const [y, m] = k.split('-'); return meses[parseInt(m)-1] + ' ' + y.slice(2); });
  const values = sortedM.map(k => byMonth[k]);
  const bgColors = sortedM.map(k => { const [y,m] = k.split('-'); return parseInt(m)-1===thisM && parseInt(y)===thisY ? '#00d084' : '#2a2e38'; });
  const brColors = sortedM.map(k => { const [y,m] = k.split('-'); return parseInt(m)-1===thisM && parseInt(y)===thisY ? '#00d084' : '#3a3f4a'; });

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartInstance = new Chart(document.getElementById('monthChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Leads', data: values, backgroundColor: bgColors, borderColor: brColors, borderWidth: 1, borderRadius: 4, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1e2128', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, titleColor: '#8a8f9a', bodyColor: '#f0f0f0', padding: 10, cornerRadius: 8 }
      },
      scales: {
        x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10, family: 'DM Mono' }, color: '#555b66', autoSkip: false, maxRotation: 45 } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false }, ticks: { font: { size: 10, family: 'DM Mono' }, color: '#555b66', precision: 0 } }
      }
    }
  });

  const sorted = Object.entries(cc).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const clist = document.getElementById('clist');
  if (sorted.length > 0) {
    const mx = sorted[0][1];
    clist.innerHTML = sorted.map(([c, n], i) =>
      `<div class="country-row">
        <span class="country-rank">${String(i+1).padStart(2,'0')}</span>
        <span class="country-name">${c}</span>
        <div class="country-bar-wrap"><div class="country-bar" style="width:${Math.round(n/mx*100)}%"></div></div>
        <span class="country-count">${n}</span>
      </div>`
    ).join('');
  } else {
    clist.innerHTML = '<p style="font-size:13px;color:#555b66;margin-top:16px;">Sin datos de país para este mes.</p>';
  }

  document.getElementById('last-update').textContent = 'Actualizado: ' + now.toLocaleString('es-AR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: '2-digit' });
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

loadAndRender();
</script>
</body>
</html>
