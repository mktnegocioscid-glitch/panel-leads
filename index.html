<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Leads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0c0f1a;--bg3:#111827;--bg4:#1a2235;--card:#0f1522;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.16);
  --text:#e2e8f0;--text2:#7d8fa8;--text3:#3d4f66;
  --green:#00e5a0;--green-dim:rgba(0,229,160,0.1);--green-dim2:rgba(0,229,160,0.05);
  --red:#ff4d72;--red-dim:rgba(255,77,114,0.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.1);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.1);
  --sidebar-w:230px;--header-h:58px;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;display:flex;flex-direction:column}
.topbar{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo-img{height:30px;width:auto;object-fit:contain}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-family:'JetBrains Mono',monospace;background:var(--green-dim2);border:1px solid rgba(0,229,160,0.18);padding:3px 9px;border-radius:99px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.last-upd{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;font-weight:500}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.btn.loading{opacity:0.4;pointer-events:none}
.spin{display:inline-block}
.btn.loading .spin{animation:spinr 0.8s linear infinite}
@keyframes spinr{to{transform:rotate(360deg)}}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hdr{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-hdr h3{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3)}
.sb-scroll{flex:1;overflow-y:auto;padding:6px}
.sb-scroll::-webkit-scrollbar{width:2px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.yr-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:10px 8px 4px;display:block}
.mb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 10px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;transition:all 0.12s;text-align:left}
.mb-btn:hover{background:var(--bg3);color:var(--text)}
.mb-btn.active{background:var(--green-dim);color:var(--green);font-weight:500}
.mb-btn .mc{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.mb-btn.active .mc{color:rgba(0,229,160,0.6)}
.mb-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-right:7px;flex-shrink:0;display:none}
.mb-btn.cur .mb-dot{display:block}
.content{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2)}
.loading-ring{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--green);animation:spinr 0.8s linear infinite}
.err-box{background:var(--red-dim);border:1px solid rgba(255,77,114,0.2);border-radius:var(--radius);padding:14px 18px;color:var(--red);font-size:13px;margin-bottom:18px}
.page-head{margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.page-sub{font-size:12px;color:var(--text2)}
.cur-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--green-dim);color:var(--green);border:1px solid rgba(0,229,160,0.2)}
.insights{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.insight{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:11px;font-weight:500}
.i-up{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,229,160,0.18)}
.i-dn{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,114,0.18)}
.i-info{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.18)}
.i-neu{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.i-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.18)}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color 0.2s}
.kpi:hover{border-color:var(--border2)}
.kpi.feat{border-color:rgba(0,229,160,0.22);background:linear-gradient(135deg,rgba(0,229,160,0.04),var(--card))}
.kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3);margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-0.03em;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;margin-bottom:7px}
.kpi.feat .kpi-val{color:var(--green)}
.kpi-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-weight:600}
.b-up{background:var(--green-dim);color:var(--green)}
.b-dn{background:var(--red-dim);color:var(--red)}
.b-neu{background:var(--bg4);color:var(--text3)}
.b-info{background:var(--blue-dim);color:var(--blue)}
.b-amber{background:var(--amber-dim);color:var(--amber)}
.gr{display:grid;gap:14px;margin-bottom:14px}
.gr-1{grid-template-columns:1fr}
.gr-2{grid-template-columns:1fr 1fr}
.gr-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:960px){.gr-2,.gr-3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px}
.card-ti{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3)}
.card-su{font-size:10px;color:var(--text3);margin-top:2px}
.cw{position:relative;width:100%}
.h180{height:180px}.h200{height:200px}.h240{height:240px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.qlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:8px}
.qvals{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.qcur{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.qprev{font-size:12px;color:var(--text3)}
.ct-hdr{display:grid;grid-template-columns:22px 1fr 80px 48px 52px;gap:7px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.ct-hcell{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.ct-hcell:not(:nth-child(2)){text-align:right}
.ct-rows{display:flex;flex-direction:column;gap:6px}
.ct-row{display:grid;grid-template-columns:22px 1fr 80px 48px 52px;align-items:center;gap:7px}
.ct-rank{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:right}
.ct-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-bw{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.ct-b{height:100%;border-radius:99px}
.ct-cur{font-size:11px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;text-align:right}
.ct-d{font-size:10px;font-family:'JetBrains Mono',monospace;text-align:right}
.dup{color:var(--green)}.ddn{color:var(--red)}.dneu{color:var(--text3)}
.src-rows{display:flex;flex-direction:column;gap:8px}
.src-row{display:flex;align-items:center;gap:10px}
.src-name{font-size:12px;color:var(--text);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-bw{flex:1;height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.src-b{height:100%;border-radius:99px;background:var(--blue)}
.src-pct{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2);min-width:36px;text-align:right}
.src-n{font-size:11px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;min-width:28px;text-align:right}
.report{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-top:14px}
.report-ti{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.report-ti::after{content:'';flex:1;height:1px;background:var(--border)}
.report-body{font-size:13px;color:var(--text2);line-height:1.8}
.report-body strong{color:var(--text);font-weight:600}
.rg{color:#00e5a0;font-weight:600}
.rr{color:#ff4d72;font-weight:600}
.ra{color:#f59e0b;font-weight:600}
.report-para{margin-bottom:12px}
.report-para:last-child{margin-bottom:0}
.leg{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:16px 0}
</style>
</head>

const MES3=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const PAL=['#3b82f6','#8b5cf6','#f59e0b','#10b981','#ef4444','#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6'];
let ALL=[], CHS=[], ACT='';
const TTP={backgroundColor:'#1a2235',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,titleColor:'#7d8fa8',bodyColor:'#e2e8f0',padding:10,cornerRadius:8,displayColors:true,boxWidth:8,boxHeight:8};

function pd(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d}
function ds(d){return d.toISOString().slice(0,10)}
function mk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function pk(k){const[y,m]=k.split('-');return{y:+y,m:+m-1}}
function prevK(k){const{y,m}=pk(k);return m===0?`${y-1}-12`:`${y}-${String(m).padStart(2,'0')}`}
function lyK(k){const{y,m}=pk(k);return`${y-1}-${String(m+1).padStart(2,'0')}`}
function dlt(c,p){if(!p)return null;return Math.round((c-p)/p*100)}
function sgn(v){return v>0?'+':''}
function bdg(v,lbl=''){
  if(v===null)return'<span class="kpi-badge b-neu">—</span>';
  const c=v>0?'b-up':v<0?'b-dn':'b-neu';
  return`<span class="kpi-badge ${c}">${sgn(v)}${v}%${lbl?' vs '+lbl:''}</span>`;
}
function dc(v){return v===null?'dneu':v>0?'dup':'ddn'}
function dt(v){if(v===null)return'—';return`${sgn(v)}${v}%`}

function normSrc(s){
  if(!s||!s.trim()||s.trim()==='-')return null;
  const low=s.trim().toLowerCase().replace(/\s+/g,' ');
  if(low===''||low==='undefined'||low==='null'||low==='n/a')return null;
  return low;
}
function prettyS(s){if(!s)return'—';return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')}

function gRows(k){return ALL.filter(r=>r[0]&&r[0].slice(0,7)===k)}
function gDay(rows){const m={};rows.forEach(r=>{const d=r[0]?r[0].slice(0,10):'';if(d)m[d]=(m[d]||0)+1});return m}
function gCountry(rows){const m={};rows.forEach(r=>{const c=(r[3]||'').trim();if(c)m[c]=(m[c]||0)+1});return m}
function gSource(rows){
  const m={};
  rows.forEach(r=>{
    // Search cols 16-22 for utm_source (non-empty, reasonable length)
    let found=null;
    for(let i=16;i<=22&&!found;i++){const v=normSrc(r[i]||'');if(v&&v.length>=2&&v.length<=50)found=v}
    if(found)m[found]=(m[found]||0)+1;
  });
  return m;
}
function hasSrc(rows){return rows.some(r=>{for(let i=16;i<=22;i++){if(normSrc(r[i]||''))return true}return false})}
function f15(rows,k){const{y,m}=pk(k);const cut=new Date(y,m,16);return rows.filter(r=>{const d=pd(r[0]);return d&&d<cut})}
function l15(rows,k){const{y,m}=pk(k);const cut=new Date(y,m,16);const end=new Date(y,m+1,0);return rows.filter(r=>{const d=pd(r[0]);return d&&d>=cut&&d<=end})}
function last12(k){const{y,m}=pk(k);const ks=[];for(let i=11;i>=0;i--){let mm=m-i,yy=y;while(mm<0){mm+=12;yy--}ks.push(`${yy}-${String(mm+1).padStart(2,'0')}`)}return ks}
function curK(){return mk(new Date())}
function killCharts(){CHS.forEach(c=>{try{c.destroy()}catch(e){}});CHS=[]}
function mkC(id,cfg){const el=document.getElementById(id);if(!el)return;const ch=new Chart(el.getContext('2d'),cfg);CHS.push(ch);return ch}

async function doRefresh(){
  const btn=document.getElementById('rbtn');btn.classList.add('loading');
  document.getElementById('err-area').style.display='none';
  try{
    const r=await fetch(CSV);
    if(!r.ok)throw new Error('HTTP '+r.status+' — Verificá que el Sheet esté publicado como CSV público.');
    const txt=await r.text();
    Papa.parse(txt,{skipEmptyLines:true,complete:(res)=>{
      ALL=res.data.filter((r,i)=>i>0&&r[0]&&/\d{4}-\d{2}-\d{2}/.test(r[0])&&new Date(r[0])>=new Date('2025-01-01'));
      buildSB();
      if(!ACT)ACT=curK();
      renderMonth(ACT);
      document.getElementById('last-upd').textContent='Actualizado: '+new Date().toLocaleString('es-AR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'2-digit'});
      btn.classList.remove('loading');
      document.getElementById('ls').style.display='none';
      document.getElementById('dash').style.display='block';
    },error:(e)=>{throw new Error(e.message)}});
  }catch(e){
    document.getElementById('err-area').innerHTML=`<div class="err-box">⚠ ${e.message}</div>`;
    document.getElementById('err-area').style.display='block';
    document.getElementById('ls').style.display='none';
    btn.classList.remove('loading');
  }
}

function buildSB(){
  const keys={};ALL.forEach(r=>{if(r[0]){const k=r[0].slice(0,7);keys[k]=(keys[k]||0)+1}});
  const sorted=Object.keys(keys).sort().reverse();
  const byY={};sorted.forEach(k=>{const y=k.slice(0,4);if(!byY[y])byY[y]=[];byY[y].push(k)});
  const ck=curK();let html='';
  Object.keys(byY).sort().reverse().forEach(y=>{
    html+=`<div><span class="yr-label">${y}</span>`;
    byY[y].forEach(k=>{
      const{m}=pk(k);const isc=k===ck;
      html+=`<button class="mb-btn${k===ACT?' active':''}${isc?' cur':''}" onclick="selMonth('${k}')"><span style="display:flex;align-items:center"><span class="mb-dot"></span>${MESES[m]}</span><span class="mc">${keys[k]}</span></button>`;
    });
    html+='</div>';
  });
  document.getElementById('sb-nav').innerHTML=html;
}

function selMonth(k){
  ACT=k;
  document.querySelectorAll('.mb-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mb-btn').forEach(b=>{if(b.getAttribute('onclick')===`selMonth('${k}')`)b.classList.add('active')});
  renderMonth(k);
  document.getElementById('main').scrollTop=0;
}

function renderMonth(key){
  killCharts();
  const{y,m}=pk(key);
  const now=new Date();
  const isNow=key===curK();
  const todayStr=ds(now);
  const todayN=now.getDate();
  const curR=gRows(key),pK=prevK(key),prevR=gRows(pK),lyR=gRows(lyK(key));
  const{m:pm,y:py}=pk(pK);
  const prevMN=MESES[pm];
  const daysInM=new Date(y,m+1,0).getDate(),daysInP=new Date(py,pm+1,0).getDate();
  const maxD=isNow?todayN:daysInM;

  const leadsToday=isNow?curR.filter(r=>r[0]&&r[0].slice(0,10)===todayStr).length:0;
  const curUntil=isNow?curR.filter(r=>{const d=pd(r[0]);return d&&d.getDate()<=todayN}).length:curR.length;
  const prevUntil=prevR.filter(r=>{const d=pd(r[0]);return d&&d.getDate()<=todayN}).length;
  const avg=maxD>0?(curR.length/maxD):0;

  const f15c=f15(curR,key).length,f15p=f15(prevR,pK).length;
  const l15c=l15(curR,key).length,l15p=l15(prevR,pK).length;

  const ccC=gCountry(curR),ccP=gCountry(prevR);
  const allCtry=[...new Set([...Object.keys(ccC),...Object.keys(ccP)])].sort((a,b)=>(ccC[b]||0)-(ccC[a]||0)).slice(0,12);

  const srcC=gSource(curR),srcP=gSource(prevR);
  const hasSrcData=hasSrc(curR);
  const topSrc=Object.keys(srcC).sort((a,b)=>srcC[b]-srcC[a]).slice(0,10);
  const srcTotal=topSrc.reduce((s,k)=>s+(srcC[k]||0),0);

  const bdC=gDay(curR),bdP=gDay(prevR);
  const dlabs=[],dcur=[],dprev=[];
  for(let d2=1;d2<=maxD;d2++){
    dlabs.push(d2);
    const cd=new Date(y,m,d2);dcur.push(bdC[ds(cd)]||0);
    if(d2<=daysInP){const pd3=new Date(py,pm,d2);dprev.push(bdP[ds(pd3)]||0)}else dprev.push(null);
  }

  const l12k=last12(key),l12v=l12k.map(k=>gRows(k).length);
  const l12l=l12k.map(k=>{const{y:yy,m:mm}=pk(k);return MES3[mm]+(yy!==y?'\'' +String(yy).slice(2):'')});

  const growing=allCtry.filter(c=>ccC[c]&&ccP[c]&&ccC[c]>ccP[c]);
  const declining=allCtry.filter(c=>ccC[c]&&ccP[c]&&ccC[c]<ccP[c]);
  const newC=allCtry.filter(c=>ccC[c]&&!ccP[c]);
  const dm=dlt(curR.length,prevR.length);

  let h=`<div class="page-head">
    <div class="page-title">${MESES[m]} ${y} ${isNow?'<span class="cur-tag">Mes actual</span>':''}</div>
    <div class="page-sub">${curR.length} leads · comparado con ${prevMN} ${py}${lyR.length?' · mismo mes '+(y-1)+': '+lyR.length:''}</div>
  </div>`;

  h+=`<div class="insights">`;
  if(isNow&&leadsToday>0)h+=`<div class="insight i-info">Hoy: ${leadsToday} lead${leadsToday!==1?'s':''}</div>`;
  if(dm!==null)h+=`<div class="insight ${dm>=0?'i-up':'i-dn'}">${dm>=0?'▲':'▼'} ${Math.abs(dm)}% vs ${prevMN}</div>`;
  if(lyR.length){const dl=dlt(curR.length,lyR.length);if(dl!==null)h+=`<div class="insight ${dl>=0?'i-up':'i-dn'}">${dl>=0?'▲':'▼'} ${Math.abs(dl)}% vs ${MESES[m]} ${y-1}</div>`}
  if(growing.length)h+=`<div class="insight i-up">↑ ${growing.slice(0,3).join(', ')}</div>`;
  if(declining.length)h+=`<div class="insight i-dn">↓ ${declining.slice(0,2).join(', ')}</div>`;
  if(newC.length)h+=`<div class="insight i-neu">Nuevo: ${newC.slice(0,2).join(', ')}</div>`;
  if(topSrc.length)h+=`<div class="insight i-amber">Top fuente: ${prettyS(topSrc[0])}</div>`;
  h+=`</div>`;

  h+=`<div class="metrics-row">`;
  if(isNow){
    const prevTodayLeads=prevR.filter(r=>{const d=pd(r[0]);return d&&d.getDate()===todayN}).length;
    h+=`<div class="kpi feat"><div class="kpi-lbl">Leads hoy</div><div class="kpi-val">${leadsToday}</div>${bdg(dlt(leadsToday,prevTodayLeads),'mismo día '+prevMN)}</div>`;
  }
  h+=`<div class="kpi ${isNow?'':'feat'}"><div class="kpi-lbl">Total mes</div><div class="kpi-val">${curR.length}</div>${bdg(dm,prevMN)}</div>`;
  h+=`<div class="kpi"><div class="kpi-lbl">${isNow?'Hasta día '+todayN:'Período completo'}</div><div class="kpi-val">${curUntil}</div>${isNow?bdg(dlt(curUntil,prevUntil),prevMN):'<span class="kpi-badge b-neu">completo</span>'}</div>`;
  h+=`<div class="kpi"><div class="kpi-lbl">Promedio/día</div><div class="kpi-val">${avg.toFixed(1)}</div><span class="kpi-badge b-info">leads/día</span></div>`;
  h+=`<div class="kpi"><div class="kpi-lbl">Países activos</div><div class="kpi-val">${Object.keys(ccC).length}</div>${newC.length?'<span class="kpi-badge b-up">+'+newC.length+' nuevos</span>':'<span class="kpi-badge b-neu">—</span>'}</div>`;
  if(lyR.length)h+=`<div class="kpi"><div class="kpi-lbl">Mismo mes ${y-1}</div><div class="kpi-val">${lyR.length}</div>${bdg(dlt(curR.length,lyR.length),'año anterior')}</div>`;
  h+=`</div>`;

  h+=`<div class="gr gr-1"><div class="card"><div class="card-hd"><div><div class="card-ti">Análisis por quincena</div><div class="card-su">vs ${prevMN} ${py}</div></div></div>
    <div class="qgrid">
      <div class="qcard"><div class="qlbl">Primera quincena (1–15)</div><div class="qvals"><span class="qcur">${f15c}</span><span class="qprev">vs ${f15p} en ${prevMN}</span></div>${bdg(dlt(f15c,f15p),prevMN)}</div>
      <div class="qcard"><div class="qlbl">Segunda quincena (16–fin)</div><div class="qvals"><span class="qcur">${l15c}</span><span class="qprev">vs ${l15p} en ${prevMN}</span></div>${bdg(dlt(l15c,l15p),prevMN)}</div>
    </div></div></div>`;

  h+=`<div class="gr gr-1"><div class="card">
    <div class="card-hd">
      <div><div class="card-ti">Leads por día del mes</div><div class="card-su">${MESES[m]} ${y} vs ${prevMN} ${py}</div></div>
      <div class="leg">
        <div class="leg-item"><div class="leg-dot" style="background:#00e5a0"></div>${MESES[m]}</div>
        <div class="leg-item"><div class="leg-dot" style="background:#3d4f66"></div>${prevMN}</div>
      </div>
    </div>
    <div class="cw h200"><canvas id="cdaily" role="img" aria-label="Leads por día del mes"></canvas></div>
  </div></div>`;

  h+=`<div class="gr gr-2">
    <div class="card"><div class="card-hd"><div><div class="card-ti">Últimos 12 meses</div><div class="card-su">Tendencia mensual de captación</div></div></div><div class="cw h200"><canvas id="cmonth" role="img" aria-label="Leads por mes"></canvas></div></div>
    <div class="card"><div class="card-hd"><div><div class="card-ti">Leads por país — ${MESES[m]}</div><div class="card-su">Verde ↑ crecimiento · Rojo ↓ caída · Azul = nuevo</div></div></div><div class="cw h200"><canvas id="cctry" role="img" aria-label="Leads por país"></canvas></div></div>
  </div>`;

  if(allCtry.length){
    const maxV=Math.max(...allCtry.map(c=>ccC[c]||0),1);
    h+=`<div class="gr gr-1"><div class="card"><div class="card-hd"><div><div class="card-ti">Detalle por país — ${MESES[m]} vs ${prevMN}</div></div></div>
    <div class="ct-hdr"><div class="ct-hcell">#</div><div class="ct-hcell">País</div><div class="ct-hcell" style="text-align:left">Barra</div><div class="ct-hcell">${MES3[m]}</div><div class="ct-hcell">Δ%</div></div>
    <div class="ct-rows">`;
    allCtry.forEach((c,i)=>{
      const cv=ccC[c]||0,pv=ccP[c]||0;
      const d2=pv?dlt(cv,pv):null;
      const bc=d2===null?'#3b82f6':d2>0?'#00e5a0':'#ff4d72';
      h+=`<div class="ct-row"><div class="ct-rank">${String(i+1).padStart(2,'0')}</div><div class="ct-name">${c}</div><div class="ct-bw"><div class="ct-b" style="width:${Math.round(cv/maxV*100)}%;background:${bc}"></div></div><div class="ct-cur">${cv}</div><div class="ct-d ${dc(d2)}">${dt(d2)}</div></div>`;
    });
    h+=`</div></div></div>`;
  }

  if(hasSrcData&&topSrc.length>0){
    const srcMaxV=srcC[topSrc[0]]||1;
    h+=`<div class="gr gr-2">
    <div class="card"><div class="card-hd"><div><div class="card-ti">Origen de leads (utm_source) — ${MESES[m]}</div><div class="card-su">Fuente de captación normalizada (sin distinción mayúsculas)</div></div></div>
    <div class="cw h240"><canvas id="csrc" role="img" aria-label="Leads por fuente de origen"></canvas></div></div>
    <div class="card"><div class="card-hd"><div><div class="card-ti">Ranking de fuentes</div><div class="card-su">% del total con fuente registrada (${srcTotal} leads)</div></div></div>
    <div class="src-rows">`;
    topSrc.forEach((s,i)=>{
      const sv=srcC[s]||0;
      const pct=srcTotal>0?Math.round(sv/srcTotal*100):0;
      const pvS=srcP[s]||0;const dS=pvS?dlt(sv,pvS):null;
      h+=`<div class="src-row">
        <div class="src-name">${prettyS(s)}</div>
        <div class="src-bw"><div class="src-b" style="width:${Math.round(sv/srcMaxV*100)}%;background:${PAL[i%PAL.length]}"></div></div>
        <div class="src-pct">${pct}%</div>
        <div class="src-n">${sv}</div>
      </div>`;
    });
    h+=`</div></div></div>`;
  }

  h+=generateReport(key,curR,prevR,lyR,{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,topSrc,srcC,srcTotal,avg,dm});

  document.getElementById('dash').innerHTML=h;

  // CHARTS
  mkC('cdaily',{type:'bar',data:{labels:dlabs,datasets:[
    {label:MESES[m],data:dcur,backgroundColor:'rgba(0,229,160,0.15)',borderColor:'#00e5a0',borderWidth:1.5,borderRadius:3,borderSkipped:false,order:1},
    {label:prevMN,data:dprev,type:'line',borderColor:'rgba(61,79,102,0.8)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3,order:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
    x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',maxRotation:0}},
    y:{grid:{color:'rgba(255,255,255,0.025)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',precision:0}}
  }}});

    x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',autoSkip:false,maxRotation:45}},
    y:{grid:{color:'rgba(255,255,255,0.025)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',precision:0}}
  }}});

  if(allCtry.length){
    const tc=allCtry.slice(0,10);
    const cv2=tc.map(c=>ccC[c]||0),pv2=tc.map(c=>ccP[c]||0);
    const bgs=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'rgba(59,130,246,0.2)':cv>pv?'rgba(0,229,160,0.18)':'rgba(255,77,114,0.18)'});
    const bds=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'#3b82f6':cv>pv?'#00e5a0':'#ff4d72'});
    mkC('cctry',{type:'bar',data:{labels:tc,datasets:[
      {label:MESES[m],data:cv2,backgroundColor:bgs,borderColor:bds,borderWidth:1.5,borderRadius:3,borderSkipped:false},
      {label:prevMN,data:pv2,backgroundColor:'rgba(61,79,102,0.18)',borderColor:'rgba(61,79,102,0.5)',borderWidth:1,borderRadius:3,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
      x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',maxRotation:35,autoSkip:false}},
      y:{grid:{color:'rgba(255,255,255,0.025)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#3d4f66',precision:0}}
    }}});
  }

  if(hasSrcData&&topSrc.length>0){
    const srcColors=topSrc.map((_,i)=>PAL[i%PAL.length]);
    mkC('csrc',{type:'doughnut',data:{labels:topSrc.map(prettyS),datasets:[{data:topSrc.map(s=>srcC[s]||0),backgroundColor:srcColors.map(c=>c+'28'),borderColor:srcColors,borderWidth:2,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:true,position:'right',labels:{font:{size:10,family:'JetBrains Mono'},color:'#7d8fa8',boxWidth:10,padding:6,generateLabels:function(chart){const data=chart.data;return data.labels.map((label,i)=>{const val=data.datasets[0].data[i];const pct=srcTotal>0?Math.round(val/srcTotal*100):0;return{text:`${label} ${pct}%`,fillStyle:data.datasets[0].borderColor[i],strokeStyle:data.datasets[0].borderColor[i],lineWidth:2,hidden:false,index:i}})}}},tooltip:TTP}}});
  }
}

function generateReport(key,curR,prevR,lyR,o){
  const{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,topSrc,srcC,srcTotal,avg,dm}=o;
  const total=curR.length,prevTotal=prevR.length;
  const dmAbs=Math.abs(dm||0);
  const topCtry=allCtry[0]||'—';
  const topCtryN=ccC[topCtry]||0,topCtryP=ccP[topCtry]||0;
  const topCtryD=dlt(topCtryN,topCtryP);
  const df15=dlt(f15c,f15p),dl15=dlt(l15c,l15p);
  let reps=[];

  let p1='';
  if(isNow){
    p1+=`En lo que va de <strong>${MESES[m]} ${y}</strong>, la agencia registró <strong>${total} leads</strong> con un promedio de <strong>${avg.toFixed(1)} leads por día</strong>. `;
    if(dm!==null)p1+=dm>0?`Esto representa un <span class="rg">crecimiento del ${dmAbs}%</span> frente a los ${prevTotal} leads de ${prevMN}, señal positiva del momentum comercial. `:dm<0?`Esto implica una <span class="rr">caída del ${dmAbs}%</span> respecto a los ${prevTotal} leads de ${prevMN}, lo que merece atención estratégica. `:`El volumen se mantiene estable respecto a ${prevMN} (${prevTotal} leads). `;
    if(leadsToday>0)p1+=`Hoy se captaron <strong>${leadsToday} lead${leadsToday!==1?'s':''}</strong>. `;
  }else{
    p1+=`Durante <strong>${MESES[m]} ${y}</strong>, la agencia captó <strong>${total} leads</strong> con un promedio de <strong>${avg.toFixed(1)} leads por día</strong>. `;
    if(dm!==null)p1+=dm>0?`El mes cerró con un <span class="rg">crecimiento del ${dmAbs}%</span> frente a los ${prevTotal} de ${prevMN}. `:dm<0?`El mes cerró con una <span class="rr">caída del ${dmAbs}%</span> frente a los ${prevTotal} de ${prevMN}. `:`El volumen resultó estable frente a ${prevMN}. `;
  }
  if(lyR.length){const dl=dlt(total,lyR.length);if(dl!==null)p1+=dl>0?`Comparado con ${MESES[m]} ${y-1} (${lyR.length} leads), el avance interanual es del <span class="rg">+${Math.abs(dl)}%</span>. `:dl<0?`Respecto a ${MESES[m]} ${y-1} (${lyR.length} leads), se observa una <span class="rr">baja interanual del ${Math.abs(dl)}%</span>. `:`El volumen es equivalente al de ${MESES[m]} ${y-1}. `}
  reps.push(p1);

  let p2=`En el análisis por quincena, la primera mitad (días 1–15) aportó <strong>${f15c} leads</strong>`;
  if(f15p>0)p2+=df15>0?`, un <span class="rg">+${df15}%</span> vs los ${f15p} de ${prevMN}`:df15<0?`, un <span class="rr">${df15}%</span> vs los ${f15p} de ${prevMN}`:`, igual que ${prevMN}`;
  p2+=`. La segunda quincena (día 16 en adelante) aportó <strong>${l15c} leads</strong>`;
  if(l15p>0)p2+=dl15>0?`, con una <span class="rg">mejora del +${dl15}%</span> vs ${prevMN} (${l15p})`:dl15<0?`, con una <span class="rr">baja del ${dl15}%</span> vs ${prevMN} (${l15p})`:`, estable vs ${prevMN}`;
  p2+='.';
  reps.push(p2);

  if(allCtry.length){
    let p3=`En cuanto a origen geográfico, <strong>${topCtry}</strong> lideró con <strong>${topCtryN} leads</strong>`;
    if(topCtryP&&topCtryD!==null)p3+=topCtryD>0?` (<span class="rg">+${topCtryD}%</span> vs ${prevMN})`:` (<span class="rr">${topCtryD}%</span> vs ${prevMN})`;
    p3+='. ';
    if(growing.length)p3+=`Mercados en crecimiento: <span class="rg">${growing.slice(0,4).join(', ')}</span>. `;
    if(declining.length)p3+=`Mercados en retroceso: <span class="rr">${declining.slice(0,3).join(', ')}</span> — se sugiere revisar la estrategia en estos destinos. `;
    if(newC.length)p3+=`Nuevos mercados este mes: <strong>${newC.slice(0,3).join(', ')}</strong>. `;
    reps.push(p3);
  }

  if(topSrc.length&&srcTotal>0){
    const topSN=prettyS(topSrc[0]),topSV=srcC[topSrc[0]]||0,topSPct=Math.round(topSV/srcTotal*100);
    let p4=`En cuanto a las fuentes de captación, <strong>${topSN}</strong> fue el canal más productivo con <strong>${topSV} leads (${topSPct}% del total con fuente registrada)</strong>. `;
    if(topSrc.length>1){const s2=prettyS(topSrc[1]),v2=srcC[topSrc[1]]||0,p2b=Math.round(v2/srcTotal*100);p4+=`Le siguió <strong>${s2}</strong> con ${v2} leads (${p2b}%). `}
    if(topSrc.length>2){const others=topSrc.slice(2,5).map(s=>`${prettyS(s)} (${Math.round((srcC[s]||0)/srcTotal*100)}%)`).join(', ');p4+=`El resto se distribuyó entre: ${others}. `}
    reps.push(p4);
  }

  let p5='';
  if(dm===null)p5=`<strong>Conclusión:</strong> Sin datos previos de comparación disponibles. Este mes establece la línea de base para análisis futuros.`;
  else if(dm>15)p5=`<strong>Conclusión:</strong> El mes presenta una <span class="rg">performance sobresaliente</span> con un crecimiento de ${dmAbs}% respecto al período anterior. Se recomienda capitalizar el momentum invirtiendo en los canales y mercados con mejor desempeño, y analizar qué cambios estratégicos explican este resultado para replicarlos.`;
  else if(dm>0)p5=`<strong>Conclusión:</strong> El mes muestra una <span class="rg">tendencia positiva moderada</span> (+${dmAbs}%). El crecimiento es sostenido aunque no explosivo. Vale la pena identificar las palancas que están funcionando y buscar formas de acelerar el ritmo.`;
  else if(dm<-15)p5=`<strong>Conclusión:</strong> El mes registra una <span class="rr">caída significativa del ${dmAbs}%</span>. Es prioritario identificar las causas — ya sean estacionales, de inversión o de mercado — y tomar medidas correctivas antes de que la tendencia se consolide.`;
  else if(dm<0)p5=`<strong>Conclusión:</strong> El mes presenta una <span class="rr">leve contracción del ${dmAbs}%</span>. Si bien no es alarmante, conviene monitorear si la tendencia continúa en los próximos períodos y revisar los mercados y canales con mayor caída.`;
  else p5=`<strong>Conclusión:</strong> El mes se mantiene <span class="ra">estable</span> sin variación respecto al anterior. La estabilidad puede indicar un mercado maduro o un techo de crecimiento. Se recomienda evaluar nuevas fuentes o mercados para retomar el crecimiento.`;
  reps.push(p5);

  return `<div class="report">
    <div class="report-ti">Reporte ejecutivo — ${MESES[m]} ${y}</div>
    <div class="report-body">${reps.map(p=>`<div class="report-para">${p}</div>`).join('')}</div>
  </div>`;
}

doRefresh();
</script>
</body>
</html>
