<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Leads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0c0f1a;--bg3:#131827;--bg4:#1c243a;--card:#0f1420;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --text:#f0f2f7;--text2:#a0aec0;--text3:#5a6e8a;
  --green:#00e5a0;--green2:#00c484;--gdim:rgba(0,229,160,0.12);--gdim2:rgba(0,229,160,0.06);
  --red:#ff4d72;--rdim:rgba(255,77,114,0.12);
  --blue:#4f9eff;--bdim:rgba(79,158,255,0.12);
  --amber:#f5a623;--adim:rgba(245,166,35,0.12);
  --purple:#9b6dff;--pdim:rgba(155,109,255,0.12);
  --sw:200px;--hh:58px;--r:12px;--rs:8px;
}
body.light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#e8ecf2;--bg4:#dde3ee;--card:#ffffff;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);--border3:rgba(0,0,0,0.22);
  --text:#0d1117;--text2:#2d3748;--text3:#6b7a90;
  --green:#007a55;--green2:#006644;--gdim:rgba(0,122,85,0.1);--gdim2:rgba(0,122,85,0.06);
  --red:#c0192f;--rdim:rgba(192,25,47,0.1);
  --blue:#1a4fc4;--bdim:rgba(26,79,196,0.1);
  --amber:#b45309;--adim:rgba(180,83,9,0.1);
  --purple:#5b21b6;--pdim:rgba(91,33,182,0.1);
}
/* Light mode overrides for elements that need explicit fixes */
body.light .card-ti{color:#0d1117}
body.light .card-su{color:#4a5568}
body.light .section-label{color:#4a5568;border-color:rgba(0,0,0,0.1)}
body.light .kpi-lbl{color:#6b7a90}
body.light .kpi-val.plain{color:#0d1117}
body.light .yr-toggle span:first-child{color:#0d1117}
body.light .mb-btn{color:#2d3748}
body.light .mb-btn.active{color:var(--green)}
body.light .ph-title{color:#0d1117}
body.light .ph-sub{color:#4a5568}
body.light .rec-box-name{color:#2d3748}
body.light .qcur{color:#0d1117}
body.light .qprev{color:#6b7a90}
body.light .ct-name{color:#0d1117}
body.light .ct-cur{color:#0d1117}
body.light .src-name{color:#0d1117}
body.light .report-body{color:#2d3748}
body.light .report-body strong{color:#0d1117}
body.light .tip-box{background:#ffffff;border-color:rgba(0,0,0,0.15);color:#2d3748;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
body.light .live-badge{background:rgba(0,122,85,0.08);border-color:rgba(0,122,85,0.25)}
body.light .upd-txt{color:#6b7a90}
body.light .last-upd{color:#6b7a90}
.theme-btn{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;font-weight:500;user-select:none;white-space:nowrap}
.theme-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.theme-icon{font-size:15px;line-height:1;transition:transform 0.4s ease}
.theme-btn:hover .theme-icon{transform:rotate(25deg)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:20;min-width:0}
.tl{display:flex;align-items:center;gap:14px;min-width:0;flex-shrink:1}
.logo-img{height:28px;width:auto;max-width:140px;object-fit:contain}
.tr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);font-family:'JetBrains Mono',monospace;background:var(--gdim2);border:1px solid rgba(0,229,160,0.2);padding:3px 10px;border-radius:99px}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.upd-txt{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;font-weight:500;text-decoration:none}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border3)}
.btn.loading{opacity:0.4;pointer-events:none}
.btn-green{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--green)}
.btn-green:hover{background:rgba(0,229,160,0.18);border-color:var(--green)}
.spin{display:inline-block}
.btn.loading .spin{animation:spinr 0.8s linear infinite}
@keyframes spinr{to{transform:rotate(360deg)}}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:0;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-tabs{display:flex;flex-direction:column;gap:0}
.sb-tab{width:100%;padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;background:transparent;border-top:none;border-right:none;border-bottom:1px solid var(--border);font-family:'Inter',sans-serif;line-height:1.2}
.sb-tab:last-child{border-bottom:1px solid var(--border)}
.sb-tab:hover{color:var(--text2);background:var(--bg3)}
.sb-tab.active{color:var(--green);border-left-color:var(--green);background:var(--gdim2)}
.sb-panel{display:none;flex:1;overflow-y:auto;padding:6px}
.sb-panel.active{display:block}
.sb-panel::-webkit-scrollbar{width:2px}
.sb-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.yr-group{margin-bottom:2px}
.yr-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 10px 5px;background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:color 0.15s}
.yr-toggle span:first-child{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#fff}
.yr-toggle:hover span:first-child{color:var(--green)}
.yr-toggle.collapsed span:first-child{color:var(--text3)}
.yr-arrow{font-size:10px;color:var(--text3);transition:color 0.15s}
.yr-toggle:hover .yr-arrow{color:var(--green)}
.yr-months{display:block}

/* TOOLTIP */
.tip-wrap{position:relative;display:inline-flex;align-items:center;gap:6px}
.tip-icon{width:14px;height:14px;border-radius:50%;border:1px solid var(--text3);color:var(--text3);font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:help;flex-shrink:0;line-height:1;transition:all 0.15s}
.tip-icon:hover{border-color:var(--green);color:var(--green)}
.tip-box{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:100;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);line-height:1.5;width:220px;font-weight:400;text-transform:none;letter-spacing:0;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.tip-wrap:hover .tip-box{display:block}
.mb-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:6px 10px;border-radius:var(--rs);border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;transition:all 0.12s;text-align:left}
.mb-btn:hover{background:var(--bg3);color:var(--text)}
.mb-btn.active{background:var(--gdim);color:var(--green);font-weight:500}
.mb-btn .mc{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.mb-btn.active .mc{color:rgba(0,229,160,0.6)}
.mb-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-right:7px;flex-shrink:0;display:none}
.mb-btn.cur .mb-dot{display:block}
.sb-placeholder{padding:20px 12px;font-size:12px;color:var(--text3);text-align:center;line-height:1.6}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* STATES */
.ls-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text2)}
.ls-ring{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--green);animation:spinr 0.8s linear infinite}
.err-box{background:var(--rdim);border:1px solid rgba(255,77,114,0.2);border-radius:var(--r);padding:14px 18px;color:var(--red);font-size:14px;margin-bottom:16px}

/* PAGE HEAD */
.ph{margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ph-title{font-size:21px;font-weight:700;letter-spacing:-0.03em;color:var(--text);display:flex;align-items:center;gap:10px}
.ph-sub{font-size:13px;color:var(--text2);margin-top:4px}
.cur-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--gdim);color:var(--green);border:1px solid rgba(0,229,160,0.25)}

/* INSIGHTS */
.insights{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.ins{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500}
.ins-up{background:var(--gdim);color:var(--green);border:1px solid rgba(0,229,160,0.2)}
.ins-dn{background:var(--rdim);color:var(--red);border:1px solid rgba(255,77,114,0.2)}
.ins-info{background:var(--bdim);color:var(--blue);border:1px solid rgba(79,158,255,0.2)}
.ins-neu{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.ins-amber{background:var(--adim);color:var(--amber);border:1px solid rgba(245,166,35,0.2)}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color 0.2s}
.kpi:hover{border-color:var(--border2)}
.kpi.feat-green{border-color:rgba(0,229,160,0.4);background:linear-gradient(135deg,rgba(0,229,160,0.08) 0%,var(--card) 60%);box-shadow:0 0 20px rgba(0,229,160,0.06)}
.kpi.feat-blue{border-color:rgba(79,158,255,0.35);background:linear-gradient(135deg,rgba(79,158,255,0.07) 0%,var(--card) 60%)}
.kpi.feat-amber{border-color:rgba(245,166,35,0.35);background:linear-gradient(135deg,rgba(245,166,35,0.07) 0%,var(--card) 60%)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3);margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:8px}
.kpi.feat-green .kpi-val{color:var(--green)}
.kpi.feat-blue .kpi-val{color:var(--blue)}
.kpi.feat-amber .kpi-val{color:var(--amber)}
.kpi-val.plain{color:var(--text)}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-weight:600}
.b-up{background:var(--gdim);color:var(--green)}
.b-dn{background:var(--rdim);color:var(--red)}
.b-neu{background:var(--bg4);color:var(--text3)}
.b-info{background:var(--bdim);color:var(--blue)}
.b-amber{background:var(--adim);color:var(--amber)}

/* GRID */
.gr{display:grid;gap:14px;margin-bottom:14px}
.g1{grid-template-columns:1fr}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:1000px){.g2,.g3{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px}
.card-ti{font-size:13px;font-weight:700;color:#fff;letter-spacing:-0.01em}
.card-su{font-size:11px;color:var(--text3);margin-top:3px}
.cw{position:relative;width:100%}
.h180{height:180px}.h210{height:210px}.h240{height:240px}.h260{height:260px}

/* QUINCENA */
.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.qlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:8px}
.qvals{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.qcur{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.qprev{font-size:12px;color:var(--text3)}

/* COUNTRY TABLE */
.ct-hdr{display:grid;grid-template-columns:22px 1fr 70px 28px 50px 56px;gap:7px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ct-hcell{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.ct-hcell:not(:nth-child(2)){text-align:right}
.ct-rows{display:flex;flex-direction:column;gap:7px}
.ct-row{display:grid;grid-template-columns:22px 1fr 70px 28px 50px 56px;align-items:center;gap:7px}
.ct-trend{font-size:13px;text-align:center;line-height:1}
.ct-rank{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:right}
.ct-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-bw{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.ct-b{height:100%;border-radius:99px}
.ct-cur{font-size:12px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;text-align:right}
.ct-d{font-size:11px;font-family:'JetBrains Mono',monospace;text-align:right}
.dup{color:var(--green)}.ddn{color:var(--red)}.dneu{color:var(--text3)}

/* SOURCE BARS */
.src-rows{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.src-row{display:flex;align-items:center;gap:10px}
.src-name{font-size:13px;color:var(--text);min-width:130px}
.src-bw{flex:1;height:6px;background:var(--bg4);border-radius:99px;overflow:hidden}
.src-b{height:100%;border-radius:99px}
.src-pct{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);min-width:38px;text-align:right}
.src-n{font-size:12px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;min-width:28px;text-align:right}
.src-delta{font-size:10px;font-family:'JetBrains Mono',monospace;min-width:40px;text-align:right}

/* REPORT */
.report{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-top:14px}
.report-ti{font-size:13px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.report-ti::after{content:'';flex:1;height:1px;background:var(--border)}
.report-body{font-size:14px;color:var(--text2);line-height:1.8}
.report-body strong{color:var(--text);font-weight:600}
.rg{color:#00e5a0;font-weight:600}
.rr{color:#ff4d72;font-weight:600}
.ra{color:#f5a623;font-weight:600}
.rp{margin-bottom:12px}
.rp:last-child{margin-bottom:0}

/* LEG */
.leg{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-d{width:9px;height:9px;border-radius:2px;flex-shrink:0}

.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* RECLUTAMIENTO SPLIT BOXES */
.rec-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.rec-box{border-radius:var(--r);padding:18px;border:1px solid}
.rec-box-usa{background:linear-gradient(135deg,rgba(79,158,255,0.07),var(--card));border-color:rgba(79,158,255,0.3)}
.rec-box-hisp{background:linear-gradient(135deg,rgba(0,229,160,0.07),var(--card));border-color:rgba(0,229,160,0.3)}
.rec-box-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rec-box-usa .rec-box-title{color:var(--blue)}
.rec-box-hisp .rec-box-title{color:var(--green)}
.rec-flag{font-size:16px}
.rec-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rec-metric{background:rgba(0,0,0,0.2);border-radius:var(--rs);padding:10px 12px}
.rec-metric .rl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:4px}
.rec-metric .rv{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.rec-box-usa .rv{color:var(--blue)}
.rec-box-hisp .rv{color:var(--green)}
.rec-metric .rb{margin-top:4px}
.rec-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.15);flex-shrink:0}
.rec-box-usa .rec-avatar{border-color:rgba(79,158,255,0.4)}
.rec-box-hisp .rec-avatar{border-color:rgba(0,229,160,0.4)}
.rec-box-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rec-box-info{}
.rec-box-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px}
.rec-box-name{font-size:13px;color:var(--text2);font-weight:400}

/* ── LOGIN OVERLAY ── */
#login-overlay{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#07090f 0%,#0c0f1a 50%,#111827 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
}
#login-overlay.hidden{display:none}
.login-box{
  width:100%;max-width:380px;padding:0 24px;
  display:flex;flex-direction:column;align-items:center;
}
.login-logo{height:96px;width:auto;margin-bottom:40px;filter:drop-shadow(0 0 20px rgba(0,229,160,0.3))}
.login-title{font-size:22px;font-weight:700;letter-spacing:-0.03em;color:#f0f2f7;margin-bottom:6px;text-align:center}
.login-sub{font-size:13px;color:#5a6e8a;margin-bottom:36px;text-align:center}
.login-field{
  width:100%;position:relative;margin-bottom:14px;
}
.login-field input{
  width:100%;padding:13px 46px 13px 16px;
  background:#0f1420;border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;color:#f0f2f7;font-size:15px;
  font-family:'Inter',sans-serif;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  letter-spacing:0.2em;
}
.login-field input:focus{
  border-color:rgba(0,229,160,0.5);
  box-shadow:0 0 0 3px rgba(0,229,160,0.08);
}
.login-field input.error{
  border-color:rgba(255,77,114,0.6);
  box-shadow:0 0 0 3px rgba(255,77,114,0.08);
  animation:shake 0.35s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.login-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#5a6e8a;
  font-size:16px;padding:2px;transition:color 0.15s;
}
.login-eye:hover{color:#a0aec0}
.login-btn{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,#00e5a0,#00c484);
  border:none;border-radius:10px;
  color:#0d1117;font-size:15px;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;
  transition:opacity 0.15s,transform 0.1s;
  letter-spacing:-0.01em;
}
.login-btn:hover{opacity:0.9}
.login-btn:active{transform:scale(0.98)}
.login-btn.loading{opacity:0.6;pointer-events:none}
.login-error{
  width:100%;margin-top:12px;padding:10px 14px;
  background:rgba(255,77,114,0.1);border:1px solid rgba(255,77,114,0.25);
  border-radius:8px;color:#ff4d72;font-size:13px;text-align:center;
  display:none;
}
.login-footer{margin-top:32px;font-size:11px;color:#3d4f66;text-align:center}
.logout-btn{
  position:fixed;bottom:20px;left:16px;z-index:100;
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:var(--rs);
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text3);font-size:12px;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all 0.15s;font-weight:500;
}
.logout-btn:hover{background:var(--rdim);color:var(--red);border-color:rgba(255,77,114,0.3)}
.login-glow{
  position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,0.06) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none;
}
</style>
</head>

function parseDate(s){

  // YYYY-MM-DD fallback
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m){
    const yr=+m[1],mon=+m[2],day=+m[3];
    if(yr>=2020&&yr<=2030&&mon>=1&&mon<=12&&day>=1&&day<=31)

    return null;
  }

}

function isEnglish(text){
  if(!text||text.trim().length<5)return false;
  // Clean and split into words
  const words=text.toLowerCase().replace(/[^a-zA-ZáéíóúüñÁÉÍÓÚÜÑ\s]/g,' ').split(/\s+/).filter(w=>w.length>1);
  if(words.length===0)return false;
  let esCount=0, enCount=0;
  words.forEach(w=>{
    // Remove accents for comparison
    const clean=w.normalize('NFD').replace(/[̀-ͯ]/g,'');
    if(ES_WORDS_SET.has(clean)||ES_WORDS_SET.has(w))esCount++;
    if(EN_WORDS_SET.has(clean)||EN_WORDS_SET.has(w))enCount++;
  });
  // If strong Spanish presence → Spanish
  if(esCount>=2)return false;
  // If English words present and more than Spanish → English
  if(enCount>=2&&enCount>=esCount)return true;
  // Fallback: check for common English-only short words
  const shortEN=words.filter(w=>['the','and','for','you','this','with','have','are','was','were','our','can','will','your','they','we','my','is','it','in','of','to','a','an','be','do','go','so','no','he','she','us','am'].includes(w));
  return shortEN.length>=3;
}

  if(lyR.length){const dl=dlt(curR.length,lyR.length);if(dl!==null)h+=`<div class="ins ${dl>=0?'ins-up':'ins-dn'}">${dl>=0?'▲':'▼'} ${Math.abs(dl)}% vs ${MESES[m]} ${y-1}</div>`}

  if(declining.length)h+=`<div class="ins ins-dn">↓ ${declining.slice(0,2).join(', ')}</div>`;
  if(newC.length)h+=`<div class="ins ins-neu">Nuevo: ${newC.slice(0,2).join(', ')}</div>`;
  h+=`</div>`;

  // KPIs
  h+=`<div class="kpi-row">`;
  if(isNow){
    const prevTL=prevR.filter(r=>{const d=r._date||pd(r[0]);return d&&d.getDate()===todayN}).length;
    h+=`<div class="kpi feat-blue"><div class="kpi-lbl">Leads hoy</div><div class="kpi-val">${leadsToday}</div>${bdg(dlt(leadsToday,prevTL),'mismo día '+prevMN)}</div>`;
  }
  h+=`<div class="kpi feat-green"><div class="kpi-lbl">Total mes</div><div class="kpi-val">${curR.length}</div>${bdg(dm,prevMN)}</div>`;
  if(isNow)h+=`<div class="kpi"><div class="kpi-lbl">Hasta día ${todayN}</div><div class="kpi-val plain">${curUntil}</div>${bdg(dlt(curUntil,prevUntil),prevMN)}</div>`;
  h+=`<div class="kpi"><div class="kpi-lbl">Promedio / día</div><div class="kpi-val plain">${avg.toFixed(1)}</div><span class="badge b-info">leads/día</span></div>`;
  h+=`<div class="kpi"><div class="kpi-lbl">Países activos</div><div class="kpi-val plain">${Object.keys(ccC).length}</div>${newC.length?'<span class="badge b-up">+'+newC.length+' nuevos</span>':'<span class="badge b-neu">—</span>'}</div>`;
  if(pautaC>0||pautaP>0)h+=`<div class="kpi feat-amber"><div class="kpi-lbl">Leads por pauta</div><div class="kpi-val">${pautaC}</div>${bdg(dlt(pautaC,pautaP),prevMN)}</div>`;
  if(lyR.length)h+=`<div class="kpi"><div class="kpi-lbl">Mismo mes ${y-1}</div><div class="kpi-val plain">${lyR.length}</div>${bdg(dlt(curR.length,lyR.length),'año ant.')}</div>`;
  h+=`</div>`;

  // Quincenas
  h+=`<div class="gr g1"><div class="card"><div class="card-hd"><div>${tip("Análisis por quincena","Divide el mes en dos mitades (días 1–15 y 16–fin) y compara cada una con el mismo período del mes anterior.")}<div class="card-su">vs ${prevMN} ${py}</div></div></div>
    <div class="qg">
      <div class="qcard"><div class="qlbl">Primera quincena (1–15)</div><div class="qvals"><span class="qcur">${f15c}</span><span class="qprev">vs ${f15p} en ${prevMN}</span></div>${bdg(dlt(f15c,f15p),prevMN)}</div>
      <div class="qcard"><div class="qlbl">Segunda quincena (16–fin)</div><div class="qvals"><span class="qcur">${l15c}</span><span class="qprev">vs ${l15p} en ${prevMN}</span></div>${bdg(dlt(l15c,l15p),prevMN)}</div>
    </div></div></div>`;

  // Diario
  h+=`<div class="gr g1"><div class="card">
    <div class="card-hd">
      <div>${tip("Leads por día del mes","Muestra cuántos leads se captaron cada día. La línea punteada representa el mes anterior para comparación visual.")}<div class="card-su">${MESES[m]} ${y} vs ${prevMN} ${py}</div></div>
      <div class="leg"><div class="leg-i"><div class="leg-d" style="background:rgba(255,77,114,0.7)"></div>Pauta</div><div class="leg-i"><div class="leg-d" style="background:#00e5a0"></div>${MESES[m]}</div><div class="leg-i"><div class="leg-d" style="background:#3d4f66"></div>${prevMN}</div></div>
    </div>
    <div class="cw h210"><canvas id="cdaily" role="img" aria-label="Leads por día"></canvas></div>
  </div></div>`;

  // 12 meses + países
  h+=`<div class="gr g2">
    <div class="card"><div class="card-hd"><div>${tip("Últimos 12 meses","Evolución mensual de leads en el último año. La barra del mes seleccionado aparece resaltada en verde.")}<div class="card-su">Evolución mensual de captación</div></div></div><div class="cw h210"><canvas id="cmonth" role="img" aria-label="Leads por mes"></canvas></div></div>
    <div class="card"><div class="card-hd"><div>${tip(`Leads por país — ${MESES[m]}`,"Verde = crecimiento vs mes anterior · Rojo = caída · Azul = país nuevo este mes.")}<div class="card-su">Verde ↑ · Rojo ↓ · Azul = nuevo vs ${prevMN}</div></div></div><div class="cw h210"><canvas id="cctry" role="img" aria-label="Leads por país"></canvas></div></div>
  </div>`;

  // Tabla países + pauta chart lado a lado
  {
    const maxV=allCtry.length?Math.max(...allCtry.map(c=>ccC[c]||0),1):1;
    // Build country table HTML
    let ctryHTML=`<div class="ct-hdr"><div class="ct-hcell">#</div><div class="ct-hcell">País</div><div class="ct-hcell" style="text-align:left">Barra</div><div class="ct-hcell">Tend.</div><div class="ct-hcell">${MES3[m]}</div><div class="ct-hcell">Δ%</div></div><div class="ct-rows">`;
    if(allCtry.length){
      allCtry.forEach((c,i)=>{
        const cv=ccC[c]||0,pv=ccP[c]||0,d2=pv?dlt(cv,pv):null;
        const bc=d2===null?'#4f9eff':d2>0?'#00e5a0':'#ff4d72';
        const trendIcon=d2===null?'':d2>0?'↑':d2<0?'↓':'=';
        const trendCol=d2===null?'var(--text3)':d2>0?'var(--green)':d2<0?'var(--red)':'var(--text3)';
        ctryHTML+=`<div class="ct-row"><div class="ct-rank">${String(i+1).padStart(2,'0')}</div><div class="ct-name">${c}</div><div class="ct-bw"><div class="ct-b" style="width:${Math.round(cv/maxV*100)}%;background:${bc}"></div></div><div class="ct-trend" style="color:${trendCol}">${trendIcon}</div><div class="ct-cur">${cv}</div><div class="ct-d ${dc(d2)}">${dt(d2)}</div></div>`;
      });
    }else{ctryHTML+=`<div class="empty">Sin datos</div>`;}
    ctryHTML+=`</div>`;
    h+=`<div class="gr g2">
      <div class="card">
        <div class="card-hd"><div>${tip("Detalle por país","Ranking completo de países con cantidad de leads del mes actual y variación porcentual respecto al mes anterior.")}<div class="card-su">${MESES[m]} vs ${prevMN}</div></div></div>
        ${ctryHTML}
      </div>
      <div class="card">
        <div class="card-hd"><div>${tip("Leads por pauta","Evolución mensual de leads captados a través de pauta en los últimos 6 meses.")}</div></div>
        <div class="cw h200"><canvas id="cpautabars" role="img" aria-label="Leads por pauta últimos 6 meses"></canvas></div>
      </div>

  }

  // Origen de leads
  if(ordSrc.length>0){
    const srcMaxV=Math.max(...ordSrc.map(k=>srcC[k]||0),1);
    h+=`<div class="gr g2">
    <div class="card"><div class="card-hd"><div>${tip(`Origen de leads — ${MESES[m]}`,"Distribución porcentual de leads según su fuente de captación (utm_source). Solo incluye registros con fuente identificada.")}<div class="card-su">Distribución por fuente de captación</div></div></div>
    <div class="cw h240"><canvas id="csrc" role="img" aria-label="Leads por origen"></canvas></div></div>
    <div class="card"><div class="card-hd"><div>${tip("Detalle por fuente","Ranking de fuentes con cantidad de leads, porcentaje del total y variación vs el mes anterior.")}<div class="card-su">% sobre total con origen registrado (${srcTotal} leads)</div></div></div>
    <div class="src-rows">`;
    ordSrc.forEach((k,i)=>{
      const cv=srcC[k]||0,pv=srcP[k]||0;
      const pct=srcTotal>0?Math.round(cv/srcTotal*100):0;
      const d2=pv?dlt(cv,pv):null;
      h+=`<div class="src-row">
        <div class="src-name">${srcLabel(k)}</div>
        <div class="src-bw"><div class="src-b" style="width:${Math.round(cv/srcMaxV*100)}%;background:${PAL[i%PAL.length]}"></div></div>
        <div class="src-pct">${pct}%</div>
        <div class="src-n">${cv}</div>
        <div class="src-delta ${dc(d2)}">${dt(d2)}</div>
      </div>`;
    });
    h+=`</div></div></div>`;
  }

  // Reporte
  h+=buildReport(key,curR,prevR,lyR,{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,ordSrc,srcC,srcTotal,pautaC,pautaP,avg,dm});

  document.getElementById('dash').innerHTML=h;

  // CHARTS
  // Build per-day source breakdown + day names + weekend detection
  const daySrcMap={}, dayPautaMap={};
  const DIAS_CORTO=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const DIAS_FULL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  curR.forEach(r=>{
    const dateKey=getDateStr(r);
    if(!dateKey)return;
    const src=normSrc(r[2]||'');
    if(!daySrcMap[dateKey])daySrcMap[dateKey]={};
    if(src)daySrcMap[dateKey][src]=(daySrcMap[dateKey][src]||0)+1;
    if(normCampaign(r[3]||'')==='pauta')dayPautaMap[dateKey]=(dayPautaMap[dateKey]||0)+1;
  });

  // Per-day colors: weekend = amber, weekday = green
  const dailyBgColors=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?'rgba(245,166,35,0.25)':'rgba(0,229,160,0.15)';
  });
  const dailyBdColors=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?'#f5a623':'#00e5a0';
  });
  const dailyXLabels=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?`${DIAS_CORTO[dow]} ${d}`:String(d);
  });

  const dcurPauta=dlabs.map(d=>dayPautaMap[ds(new Date(y,m,d))]||0);
  const dcurOrg=dlabs.map((d,i)=>Math.max(0,dcur[i]-dcurPauta[i]));

  mkC('cdaily',{type:'bar',data:{labels:dailyXLabels,datasets:[
    {label:'Pauta',data:dcurPauta,backgroundColor:'rgba(255,77,114,0.55)',borderColor:'#ff4d72',borderWidth:1,borderRadius:3,borderSkipped:false,order:1,stack:'cur'},
    {label:MESES[m],data:dcurOrg,backgroundColor:dailyBgColors,borderColor:dailyBdColors,borderWidth:1.5,borderRadius:3,borderSkipped:false,order:1,stack:'cur'},
    {label:prevMN,data:dprev,type:'line',borderColor:'rgba(90,110,138,0.7)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3,order:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
    tooltip:{...TTP,mode:'index',intersect:false,callbacks:{
      title:(items)=>{
        const idx=items[0].dataIndex;
        const d=dlabs[idx];
        return `${DIAS_FULL[new Date(y,m,d).getDay()]} ${d} — ${MESES[m]} ${y}`;
      },
      label:(item)=>{
        if(item.dataset.type==='line')return `${prevMN}: ${item.raw??0}`;
        if(item.dataset.label==='Pauta'){
          const v=item.raw||0;
          return v>0?`  Pauta: ${v}`:null;
        }
        const idx=item.dataIndex;
        const dayDate=ds(new Date(y,m,dlabs[idx]));
        const total=dcur[idx]||0;
        const srcs=daySrcMap[dayDate]||{};
        const pautaV=dcurPauta[idx]||0;
        const lines=[`Total: ${total}`];
        if(pautaV>0)lines.push(`  Pauta: ${pautaV}`);
        SRC_MAP.forEach(def=>{const v=srcs[def.key]||0;if(v>0)lines.push(`  ${def.label}: ${v}`)});
        return lines;
      },
      filter:(item)=>item.dataset.label!=='Pauta'
    }}
  },scales:{
    x:{grid:{display:false},border:{display:false},stacked:true,ticks:{font:{size:9,family:'JetBrains Mono'},color:(ctx)=>{
      const idx=ctx.index;
      const dow=new Date(y,m,dlabs[idx]).getDay();
      return(dow===0||dow===6)?'#f5a623':'#5a6e8a';
    },maxRotation:0}},
    y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},stacked:true,ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
  }}});

  const l12c=l12k.map(k=>k===key?'#00e5a0':'#1c2a42'),l12b=l12k.map(k=>k===key?'#00e5a0':'#263550');

  // Pauta bars chart — last 6 months
  if(document.getElementById('cpautabars')){
    const last6k=last12(key).slice(-6);
    const last6pautaV=last6k.map(k=>gRows(k).filter(r=>normCampaign(r[3]||'')==='pauta').length);
    const last6l=last6k.map(k=>{const{y:yy,m:mm}=pk(k);return MES3[mm]+(yy!==y?`'${String(yy).slice(2)}`:'')});
    const pb6c=last6k.map(k=>k===key?'#ff4d72':'rgba(255,77,114,0.45)');
    const pb6b=last6k.map(k=>k===key?'#ff4d72':'rgba(255,77,114,0.7)');
    mkC('cpautabars',{type:'bar',data:{labels:last6l,datasets:[{label:'Pauta',data:last6pautaV,backgroundColor:pb6c,borderColor:pb6b,borderWidth:1.5,borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},
        scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{size:10,family:'JetBrains Mono'},color:'#5a6e8a'}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:10,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}}}});
  }

  mkC('cmonth',{type:'bar',data:{labels:l12l,datasets:[{label:'Leads',data:l12v,backgroundColor:l12c,borderColor:l12b,borderWidth:1,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
    x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',autoSkip:false,maxRotation:45}},
    y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
  }}});

  if(allCtry.length){
    const tc=allCtry.slice(0,10);
    const bgs=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'rgba(79,158,255,0.18)':cv>pv?'rgba(0,229,160,0.18)':'rgba(255,77,114,0.18)'});
    const bds=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'#4f9eff':cv>pv?'#00e5a0':'#ff4d72'});
    mkC('cctry',{type:'bar',data:{labels:tc,datasets:[
      {label:MESES[m],data:tc.map(c=>ccC[c]||0),backgroundColor:bgs,borderColor:bds,borderWidth:1.5,borderRadius:3,borderSkipped:false},
      {label:prevMN,data:tc.map(c=>ccP[c]||0),backgroundColor:'rgba(90,110,138,0.15)',borderColor:'rgba(90,110,138,0.4)',borderWidth:1,borderRadius:3,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
      x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',maxRotation:35,autoSkip:false}},
      y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
    }}});
  }

  if(ordSrc.length>0){
    const srcColors=ordSrc.map((_,i)=>PAL[i%PAL.length]);
    const legColor=document.body.classList.contains('light')?'#111':'#ffffff';
    mkC('csrc',{type:'doughnut',data:{
      labels:ordSrc.map(srcLabel),
      datasets:[{data:ordSrc.map(k=>srcC[k]||0),backgroundColor:srcColors.map(c=>c+'2a'),borderColor:srcColors,borderWidth:2,hoverOffset:5}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{
      legend:{display:true,position:'right',labels:{font:{size:12,family:'Inter',weight:'600'},color:legColor,boxWidth:12,padding:12,
        generateLabels:(chart)=>{
          const d=chart.data;
          return d.labels.map((lbl,i)=>{
            const val=d.datasets[0].data[i];
            const pct=srcTotal>0?Math.round(val/srcTotal*100):0;
            return{text:`${lbl}  ${pct}%`,fillStyle:srcColors[i],strokeStyle:srcColors[i],lineWidth:2,hidden:false,index:i,fontColor:legColor};
          });
        }
      }},
      tooltip:TTP
    }}});
  }
}

function buildReport(key,curR,prevR,lyR,o){
  const{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,ordSrc,srcC,srcTotal,pautaC,pautaP,avg,dm}=o;
  const total=curR.length,prevTotal=prevR.length,dmAbs=Math.abs(dm||0);
  const topC=allCtry[0]||'—',topCV=ccC[topC]||0,topCP=ccP[topC]||0;
  const df15=dlt(f15c,f15p),dl15=dlt(l15c,l15p);
  let ps=[];

  // P1 General
  let p1=isNow
    ?`En lo que va de <strong>${MESES[m]} ${y}</strong>, se captaron <strong>${total} leads</strong> con un promedio de <strong>${avg.toFixed(1)} por día</strong>. `
    :`Durante <strong>${MESES[m]} ${y}</strong> se captaron <strong>${total} leads</strong> con un promedio de <strong>${avg.toFixed(1)} por día</strong>. `;
  if(dm!==null)p1+=dm>0?`Esto representa un <span class="rg">crecimiento del ${dmAbs}%</span> frente a los ${prevTotal} de ${prevMN}. `:dm<0?`Se registró una <span class="rr">caída del ${dmAbs}%</span> respecto a los ${prevTotal} de ${prevMN}. `:`El volumen fue similar a ${prevMN} (${prevTotal} leads). `;
  if(isNow&&leadsToday>0)p1+=`Hoy se generaron <strong>${leadsToday} lead${leadsToday!==1?'s':''}</strong>. `;
  if(lyR.length){const dl=dlt(total,lyR.length);if(dl!==null)p1+=dl>0?`Interanualmente, el crecimiento es del <span class="rg">+${Math.abs(dl)}%</span> respecto a ${MESES[m]} ${y-1} (${lyR.length} leads). `:dl<0?`Interanualmente hay una <span class="rr">baja del ${Math.abs(dl)}%</span> vs ${MESES[m]} ${y-1}. `:`Mismo volumen que ${MESES[m]} ${y-1}. `}
  ps.push(p1);

  // P2 Quincenas
  let p2=`Por quincena: la primera mitad aportó <strong>${f15c} leads</strong>`;
  if(f15p>0)p2+=df15>0?` (<span class="rg">+${df15}%</span> vs ${prevMN})`:df15<0?` (<span class="rr">${df15}%</span> vs ${prevMN})`:`(igual que ${prevMN})`;
  p2+=`; la segunda mitad aportó <strong>${l15c} leads</strong>`;
  if(l15p>0)p2+=dl15>0?` (<span class="rg">+${dl15}%</span> vs ${prevMN})`:dl15<0?` (<span class="rr">${dl15}%</span> vs ${prevMN})`:`(igual que ${prevMN})`;
  p2+='.';
  ps.push(p2);

  // P3 Países
  if(allCtry.length){
    const topD=dlt(topCV,topCP);
    let p3=`El principal mercado fue <strong>${topC}</strong> con <strong>${topCV} leads</strong>`;
    if(topCP&&topD!==null)p3+=topD>0?` (<span class="rg">+${topD}%</span> vs ${prevMN})`:` (<span class="rr">${topD}%</span> vs ${prevMN})`;
    p3+='. ';
    if(growing.length)p3+=`En crecimiento: <span class="rg">${growing.slice(0,4).join(', ')}</span>. `;
    if(declining.length)p3+=`En retroceso: <span class="rr">${declining.slice(0,3).join(', ')}</span>. `;
    if(newC.length)p3+=`Nuevos mercados: <strong>${newC.slice(0,3).join(', ')}</strong>. `;
    ps.push(p3);
  }

  // P4 Fuentes
  if(ordSrc.length&&srcTotal>0){
    const top=ordSrc[0],topV=srcC[top]||0,topPct=Math.round(topV/srcTotal*100);
    let p4=`La fuente de captación principal fue <strong>${srcLabel(top)}</strong> con <strong>${topV} leads (${topPct}%)</strong>. `;
    if(ordSrc.length>1){const s2=ordSrc[1],v2=srcC[s2]||0;p4+=`Le siguió <strong>${srcLabel(s2)}</strong> con ${v2} leads (${Math.round(v2/srcTotal*100)}%). `}
    if(pautaC>0){const pp=pautaP?dlt(pautaC,pautaP):null;p4+=`Los leads originados por pauta fueron <strong>${pautaC}</strong>${pp!==null?` (${pp>=0?'<span class="rg">+'+pp+'%</span>':'<span class="rr">'+pp+'%</span>'} vs ${prevMN})`:''}. `}
    ps.push(p4);
  }

  return `<div class="report">
    <div class="report-ti">Reporte ejecutivo — ${MESES[m]} ${y}</div>
    <div class="report-body">${ps.map(p=>`<div class="rp">${p}</div>`).join('')}</div>
  </div>`;
}


function renderRec(key){
  // destroy rec charts
  // Destroy all tracked rec charts and reset
  CHS_REC.forEach(c=>{try{c.destroy()}catch(e){}});
  CHS_REC=[];
  // Also destroy any orphaned charts by canvas ID
  ['rcdaily','rcmonth','rcctry','rcsrc'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const ex=Chart.getChart(el);if(ex)ex.destroy();}
  });
  const{y,m}=pk(key);
  const now=new Date();
  const isNow=key===curK();
  const todayStr=ds(now);
  const todayN=now.getDate();
  const curR=gRowsRec(key),pKey=prevK(key),prevR=gRowsRec(pKey),lyR=gRowsRec(lyK(key));
  const{m:pm,y:py}=pk(pKey);
  const prevMN=MESES[pm];
  const daysInM=new Date(y,m+1,0).getDate(),daysInP=new Date(py,pm+1,0).getDate();
  const maxD=isNow?todayN:daysInM;

  // Split USA vs HISPANO

  // Tabla países
    // Tabla países + pauta chart lado a lado — reclutamiento
  {
    const maxV=allCtry.length?Math.max(...allCtry.map(c=>ccC[c]||0),1):1;
    let ctryHTMLr=`<div class="ct-hdr"><div class="ct-hcell">#</div><div class="ct-hcell">País</div><div class="ct-hcell" style="text-align:left">Barra</div><div class="ct-hcell">Tend.</div><div class="ct-hcell">${MES3[m]}</div><div class="ct-hcell">Δ%</div></div><div class="ct-rows">`;
    if(allCtry.length){
      allCtry.forEach((c,i)=>{
        const cv=ccC[c]||0,pv=ccP[c]||0,d2=pv?dlt(cv,pv):null;
        const bc=d2===null?'#4f9eff':d2>0?'#00e5a0':'#ff4d72';
        const trendIcon=d2===null?'':d2>0?'↑':d2<0?'↓':'=';
        const trendCol=d2===null?'var(--text3)':d2>0?'var(--green)':d2<0?'var(--red)':'var(--text3)';
        ctryHTMLr+=`<div class="ct-row"><div class="ct-rank">${String(i+1).padStart(2,'0')}</div><div class="ct-name">${c}</div><div class="ct-bw"><div class="ct-b" style="width:${Math.round(cv/maxV*100)}%;background:${bc}"></div></div><div class="ct-trend" style="color:${trendCol}">${trendIcon}</div><div class="ct-cur">${cv}</div><div class="ct-d ${dc(d2)}">${dt(d2)}</div></div>`;
      });
    }else{ctryHTMLr+=`<div class="empty">Sin datos</div>`;}
    ctryHTMLr+=`</div>`;
    h+=`<div class="gr g2">
      <div class="card">
        <div class="card-hd"><div>${tip("Detalle por país de nacimiento","Ranking completo de países de origen de los postulantes, con cantidad del mes actual y variación porcentual respecto al mes anterior.")}</div></div>
        ${ctryHTMLr}
      </div>
      <div class="card">
        <div class="card-hd"><div>${tip("Leads por pauta","Evolución de postulaciones por pauta — últimos 6 meses.")}</div></div>
        <div class="cw h200"><canvas id="rcpautabars" role="img" aria-label="Postulantes por pauta"></canvas></div>
      </div>
    </div>`;
  }

  // Origen
  if(ordSrc.length>0){
    const srcMaxV=Math.max(...ordSrc.map(k=>srcC[k]||0),1);
    h+=`<div class="gr g2">
    <div class="card"><div class="card-hd"><div>${tip(`Origen de postulantes — ${MESES[m]}`,"Distribución porcentual de postulaciones según su fuente de captación (utm_source). Muestra qué canales están atrayendo más candidatos. Solo incluye registros con fuente identificada.")}</div></div>
    <div class="cw h240"><canvas id="rcsrc" role="img" aria-label="Postulantes por fuente"></canvas></div></div>
    <div class="card"><div class="card-hd"><div>${tip("Detalle por fuente de captación","Ranking de fuentes con cantidad de postulaciones, porcentaje sobre el total con fuente registrada, y variación respecto al mes anterior. Identifica los canales más y menos efectivos.")}</div></div>
    <div class="src-rows">`;
    ordSrc.forEach((k,i)=>{
      const cv=srcC[k]||0,pv=srcP[k]||0;
      const pct=srcTotal>0?Math.round(cv/srcTotal*100):0;
      h+=`<div class="src-row">
        <div class="src-name">${srcLabel(k)}</div>
        <div class="src-bw"><div class="src-b" style="width:${Math.round(cv/srcMaxV*100)}%;background:${PAL[i%PAL.length]}"></div></div>
        <div class="src-pct">${pct}%</div>
        <div class="src-n">${cv}</div>
        <div class="src-delta ${dc(pv?dlt(cv,pv):null)}">${dt(pv?dlt(cv,pv):null)}</div>
      </div>`;
    });
    h+=`</div></div></div>`;
  }

  // Reporte
  h+=buildReportRec(key,curR,prevR,lyR,usaR,hispR,{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,ordSrc,srcC,srcTotal,pautaC,pautaP,avg,dm});

  // Clear and replace content — prevents duplication on refresh
  const dashRec = document.getElementById('dash-rec');
  dashRec.innerHTML = '';
  dashRec.innerHTML = h;

  // CHARTS — destroy any existing before creating
  function mkRC(id,cfg){
    const el=document.getElementById(id);if(!el)return;
    // destroy existing chart on this canvas if any
    const existing=Chart.getChart(el);if(existing)existing.destroy();
    const ch=new Chart(el.getContext('2d'),cfg);
    CHS_REC.push(ch);
  }

  // Build per-day source + geral/bea breakdown for reclutamiento tooltip
  const recDaySrcMap={}, recDayGeralMap={}, recDayBeaMap={}, recDayPautaMap={};
  const REC_DIAS_CORTO=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const REC_DIAS_FULL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  curR.forEach(r=>{
    const dateKey=getDateStrRec(r);
    if(!dateKey)return;
    const src=normSrc(r[2]||'');
    if(!recDaySrcMap[dateKey])recDaySrcMap[dateKey]={};
    if(src)recDaySrcMap[dateKey][src]=(recDaySrcMap[dateKey][src]||0)+1;
    if(isUSA(r))recDayGeralMap[dateKey]=(recDayGeralMap[dateKey]||0)+1;
    else recDayBeaMap[dateKey]=(recDayBeaMap[dateKey]||0)+1;
    if(normCampaign(r[3]||'')==='pauta')recDayPautaMap[dateKey]=(recDayPautaMap[dateKey]||0)+1;
  });

  // Weekend colors for rec chart
  const recDailyBg=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?'rgba(245,166,35,0.25)':'rgba(0,229,160,0.15)';
  });
  const recDailyBd=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?'#f5a623':'#00e5a0';
  });
  const recDailyLabels=dlabs.map(d=>{
    const dow=new Date(y,m,d).getDay();
    return(dow===0||dow===6)?`${REC_DIAS_CORTO[dow]} ${d}`:String(d);
  });

  const dcurRPauta=dlabs.map(d=>recDayPautaMap[ds(new Date(y,m,d))]||0);
  const dcurROrg=dlabs.map((d,i)=>Math.max(0,dcur[i]-dcurRPauta[i]));

  mkRC('rcdaily',{type:'bar',data:{labels:recDailyLabels,datasets:[
    {label:'Pauta',data:dcurRPauta,backgroundColor:'rgba(255,77,114,0.55)',borderColor:'#ff4d72',borderWidth:1,borderRadius:3,borderSkipped:false,order:1,stack:'cur'},
    {label:MESES[m],data:dcurROrg,backgroundColor:recDailyBg,borderColor:recDailyBd,borderWidth:1.5,borderRadius:3,borderSkipped:false,order:1,stack:'cur'},
    {label:prevMN,data:dprev,type:'line',borderColor:'rgba(90,110,138,0.7)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3,order:0}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
    tooltip:{...TTP,mode:'index',intersect:false,callbacks:{
      title:(items)=>{
        const idx=items[0].dataIndex;
        const d=dlabs[idx];
        return `${REC_DIAS_FULL[new Date(y,m,d).getDay()]} ${d} — ${MESES[m]} ${y}`;
      },
      label:(item)=>{
        if(item.dataset.type==='line')return `${prevMN}: ${item.raw??0}`;
        if(item.dataset.label==='Pauta')return null;
        const idx=item.dataIndex;
        const dayDate=ds(new Date(y,m,dlabs[idx]));
        const total=dcur[idx]||0;
        const srcs=recDaySrcMap[dayDate]||{};
        const geral=recDayGeralMap[dayDate]||0;
        const bea=recDayBeaMap[dayDate]||0;
        const pautaV=dcurRPauta[idx]||0;
        const lines=[`Total: ${total}`,`  🇺🇸 Geral: ${geral}`,`  🌎 Bea: ${bea}`];
        if(pautaV>0)lines.push(`  Pauta: ${pautaV}`);
        if(Object.keys(srcs).length>0)lines.push('—');
        SRC_MAP.forEach(def=>{const v=srcs[def.key]||0;if(v>0)lines.push(`  ${def.label}: ${v}`)});
        return lines;
      },
      filter:(item)=>item.dataset.label!=='Pauta'
    }}
  },scales:{
    x:{grid:{display:false},border:{display:false},stacked:true,ticks:{font:{size:9,family:'JetBrains Mono'},color:(ctx)=>{
      const idx=ctx.index;
      const dow=new Date(y,m,dlabs[idx]).getDay();
      return(dow===0||dow===6)?'#f5a623':'#5a6e8a';
    },maxRotation:0}},
    y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},stacked:true,ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
  }}});

  // Pauta bars chart reclutamiento
  if(document.getElementById('rcpautabars')){
    const last6kr=last12(key).slice(-6);
    const last6pautaR=last6kr.map(k=>gRowsRec(k).filter(r=>normCampaign(r[3]||'')==='pauta').length);
    const last6lr=last6kr.map(k=>{const{y:yy,m:mm}=pk(k);return MES3[mm]+(yy!==y?`'${String(yy).slice(2)}`:'')});
    const pbrc=last6kr.map(k=>k===key?'#ff4d72':'rgba(255,77,114,0.45)');
    const pbrb=last6kr.map(k=>k===key?'#ff4d72':'rgba(255,77,114,0.7)');
    mkRC('rcpautabars',{type:'bar',data:{labels:last6lr,datasets:[{label:'Pauta',data:last6pautaR,backgroundColor:pbrc,borderColor:pbrb,borderWidth:1.5,borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},
        scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{size:10,family:'JetBrains Mono'},color:'#5a6e8a'}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:10,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}}}});
  }

  const l12c=l12k.map(k=>k===key?'#00e5a0':'#1c2a42'),l12b=l12k.map(k=>k===key?'#00e5a0':'#263550');
  mkRC('rcmonth',{type:'bar',data:{labels:l12l,datasets:[{label:'Postulantes',data:l12v,backgroundColor:l12c,borderColor:l12b,borderWidth:1,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
    x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',autoSkip:false,maxRotation:45}},
    y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
  }}});

  if(allCtry.length){
    const tc=allCtry.slice(0,10);
    const bgs=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'rgba(79,158,255,0.18)':cv>pv?'rgba(0,229,160,0.18)':'rgba(255,77,114,0.18)'});
    const bds=tc.map(c=>{const cv=ccC[c]||0,pv=ccP[c]||0;return!pv?'#4f9eff':cv>pv?'#00e5a0':'#ff4d72'});
    mkRC('rcctry',{type:'bar',data:{labels:tc,datasets:[
      {label:MESES[m],data:tc.map(c=>ccC[c]||0),backgroundColor:bgs,borderColor:bds,borderWidth:1.5,borderRadius:3,borderSkipped:false},
      {label:prevMN,data:tc.map(c=>ccP[c]||0),backgroundColor:'rgba(90,110,138,0.15)',borderColor:'rgba(90,110,138,0.4)',borderWidth:1,borderRadius:3,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TTP},scales:{
      x:{grid:{display:false},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',maxRotation:35,autoSkip:false}},
      y:{grid:{color:'rgba(255,255,255,0.03)'},border:{display:false},ticks:{font:{size:9,family:'JetBrains Mono'},color:'#5a6e8a',precision:0}}
    }}});
  }

  if(ordSrc.length>0){
    const srcColors=ordSrc.map((_,i)=>PAL[i%PAL.length]);
  const rcLegColor=document.body.classList.contains('light')?'#111':'#ffffff';
    mkRC('rcsrc',{type:'doughnut',data:{
      labels:ordSrc.map(srcLabel),
      datasets:[{data:ordSrc.map(k=>srcC[k]||0),backgroundColor:srcColors.map(c=>c+'2a'),borderColor:srcColors,borderWidth:2,hoverOffset:5}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
    plugins:{
      legend:{display:true,position:'right',labels:{font:{size:12,family:'Inter',weight:'600'},color:rcLegColor,boxWidth:12,padding:12,
        generateLabels:(chart)=>{
          const d=chart.data;
          return d.labels.map((lbl,i)=>{
            const val=d.datasets[0].data[i];
            const pct=srcTotal>0?Math.round(val/srcTotal*100):0;
            return{text:`${lbl}  ${pct}%`,fillStyle:srcColors[i],strokeStyle:srcColors[i],lineWidth:2,hidden:false,index:i,fontColor:rcLegColor};
          });
        }
      }},
      tooltip:TTP
    }}});
  }
}

function buildReportRec(key,curR,prevR,lyR,usaR,hispR,o){
  const{isNow,todayN,leadsToday,prevMN,py,y,m,f15c,f15p,l15c,l15p,allCtry,ccC,ccP,growing,declining,newC,ordSrc,srcC,srcTotal,pautaC,pautaP,avg,dm}=o;
  const total=curR.length,prevTotal=prevR.length,dmAbs=Math.abs(dm||0);
  const df15=dlt(f15c,f15p),dl15=dlt(l15c,l15p);
  let ps=[];

  let p1=isNow
    ?`En lo que va de <strong>${MESES[m]} ${y}</strong> se recibieron <strong>${total} postulaciones</strong> con un promedio de <strong>${avg.toFixed(1)} por día</strong>. `
    :`Durante <strong>${MESES[m]} ${y}</strong> se recibieron <strong>${total} postulaciones</strong> con promedio de <strong>${avg.toFixed(1)} por día</strong>. `;
  if(dm!==null)p1+=dm>0?`Representa un <span class="rg">crecimiento del ${dmAbs}%</span> vs ${prevMN}. `:dm<0?`Implica una <span class="rr">caída del ${dmAbs}%</span> vs ${prevMN}. `:`Volumen estable respecto a ${prevMN}. `;
  p1+=`De estas, <strong>${usaR.length} corresponden a USA (Geral)</strong> y <strong>${hispR.length} a Hispanos (Bea)</strong>.`;
  ps.push(p1);

  let p2=`Por quincena: primera mitad <strong>${f15c} postulaciones</strong>`;
  if(f15p>0)p2+=df15>0?` (<span class="rg">+${df15}%</span> vs ${prevMN})`:df15<0?` (<span class="rr">${df15}%</span> vs ${prevMN})`:`(igual que ${prevMN})`;
  p2+=`; segunda mitad <strong>${l15c}</strong>`;
  if(l15p>0)p2+=dl15>0?` (<span class="rg">+${dl15}%</span>)`:dl15<0?` (<span class="rr">${dl15}%</span>)`:`(estable)`;
  p2+='.';
  ps.push(p2);

  if(allCtry.length){
    const topC=allCtry[0],topV=ccC[topC]||0,topP=ccP[topC]||0,topD=dlt(topV,topP);
    let p3=`El principal país de origen fue <strong>${topC}</strong> con <strong>${topV} postulaciones</strong>`;
    if(topP&&topD!==null)p3+=topD>0?` (<span class="rg">+${topD}%</span> vs ${prevMN})`:` (<span class="rr">${topD}%</span> vs ${prevMN})`;
    p3+='. ';
    if(growing.length)p3+=`En crecimiento: <span class="rg">${growing.slice(0,4).join(', ')}</span>. `;
    if(declining.length)p3+=`En retroceso: <span class="rr">${declining.slice(0,3).join(', ')}</span>. `;
    ps.push(p3);
  }

  if(ordSrc.length&&srcTotal>0){
    const top=ordSrc[0],topV=srcC[top]||0,topPct=Math.round(topV/srcTotal*100);
    let p4=`La principal fuente de captación fue <strong>${srcLabel(top)}</strong> con <strong>${topV} postulaciones (${topPct}%)</strong>. `;
    if(pautaC>0){const pp=pautaP?dlt(pautaC,pautaP):null;p4+=`Postulaciones por pauta: <strong>${pautaC}</strong>${pp!==null?` (${pp>=0?'<span class="rg">+'+pp+'%</span>':'<span class="rr">'+pp+'%</span>'} vs ${prevMN})`:''}. `}
    ps.push(p4);
  }

  return `<div class="report">
    <div class="report-ti">Reporte ejecutivo — ${MESES[m]} ${y}</div>
    <div class="report-body">${ps.map(p=>`<div class="rp">${p}</div>`).join('')}</div>
  </div>`;
}

// Apply theme immediately on load
document.addEventListener('DOMContentLoaded', function(){
  applyTheme();
});

// ── LOGIN ──
const LOGIN_PASS='2133';
const SESSION_KEY='mh_panel_auth';

function togglePass(){
  const inp=document.getElementById('login-input');
  const btn=document.getElementById('eye-btn');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

function doLogin(){
  const val=document.getElementById('login-input').value;
  const btn=document.getElementById('login-btn');
  if(val===LOGIN_PASS){
    btn.classList.add('loading');
    btn.textContent='Verificando...';
    sessionStorage.setItem(SESSION_KEY,'1');
    setTimeout(()=>{
      document.getElementById('login-overlay').classList.add('hidden');
    },400);
  }else{
    document.getElementById('login-input').classList.add('error');
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-input').value='';
    document.getElementById('login-input').focus();
  }
}

function doLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('login-input').value='';
  document.getElementById('login-input').type='password';
  document.getElementById('eye-btn').textContent='👁';
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-input').classList.remove('error');
  document.getElementById('login-btn').classList.remove('loading');
  document.getElementById('login-btn').textContent='Ingresar';
  setTimeout(()=>document.getElementById('login-input').focus(),100);
}

function checkSession(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    document.getElementById('login-overlay').classList.add('hidden');
  }else{
    setTimeout(()=>{const el=document.getElementById('login-input');if(el)el.focus();},150);
  }
}
checkSession();

doRefresh();
</script>
